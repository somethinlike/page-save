<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Save</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header>
    <h1>Page Save</h1>
    <div id="status" class="status disconnected">Disconnected</div>
  </header>

  <div id="controls">
    <button id="btn-refresh" title="Refresh tab list">Refresh</button>
    <button id="btn-select-all" title="Select all tabs">Select All</button>
    <button id="btn-deselect-all" title="Deselect all tabs">Deselect All</button>
  </div>

  <div id="tab-list"></div>

  <footer>
    <button id="btn-save" class="btn-primary" disabled>Save Selected (0)</button>
    <div id="progress" class="hidden">
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <span id="progress-text"></span>
    </div>
    <div id="last-session" class="hidden">
      <span id="session-info"></span>
    </div>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
